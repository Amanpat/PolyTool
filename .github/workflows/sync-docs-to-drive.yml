name: Sync Docs to Google Drive
on:
  # Manual trigger exists for connector/sync verification when path filters do not fire.
  workflow_dispatch:
  push:
    branches: ['**']
    paths:
      - "docs/**"
      - "claude.md"
      - "AGENTS.md"
      - "config/strategy_research_program.md"

jobs:
  sync-to-drive:
    runs-on: ubuntu-latest
    env:
      GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Show current branch
        shell: bash
        run: |
          set -euo pipefail
          echo "Triggered by push to branch: ${GITHUB_REF_NAME}"
          echo "Full ref: ${GITHUB_REF}"

      - name: Validate Google Drive secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GDRIVE_CREDENTIALS}" ]; then
            echo "GDRIVE_CREDENTIALS missing or empty. Configure the repository secret before running Drive sync." >&2
            exit 1
          fi
          echo "GDRIVE_CREDENTIALS present"

          if [ -z "${GDRIVE_FOLDER_ID}" ]; then
            echo "GDRIVE_FOLDER_ID missing or empty. Configure the repository secret before running Drive sync." >&2
            exit 1
          fi
          echo "GDRIVE_FOLDER_ID present"

          credentials_file="$(mktemp)"
          trap 'rm -f "${credentials_file}"' EXIT

          if ! printf '%s' "${GDRIVE_CREDENTIALS}" | base64 --decode > "${credentials_file}" 2>/dev/null; then
            echo "GDRIVE_CREDENTIALS base64 decode failed. Store the service-account JSON as a base64-encoded repository secret." >&2
            exit 1
          fi
          echo "GDRIVE_CREDENTIALS base64 decode passed"

          python3 - "${credentials_file}" <<'PY'
          import json
          import pathlib
          import sys

          credentials_path = pathlib.Path(sys.argv[1])
          try:
              payload = json.loads(credentials_path.read_text())
          except json.JSONDecodeError:
              print(
                  "GDRIVE_CREDENTIALS JSON parse failed. Decoded secret is not valid JSON.",
                  file=sys.stderr,
              )
              sys.exit(1)

          required_keys = ("type", "client_email", "private_key", "project_id")
          missing_keys = [key for key in required_keys if not payload.get(key)]
          if missing_keys:
              print(
                  "GDRIVE_CREDENTIALS JSON validation failed. Missing required service-account keys: "
                  + ", ".join(missing_keys),
                  file=sys.stderr,
              )
              sys.exit(1)

          if payload.get("type") != "service_account":
              print(
                  "GDRIVE_CREDENTIALS JSON validation failed. type must be service_account.",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY
          echo "GDRIVE_CREDENTIALS JSON parse passed"

      - name: Install rclone
        shell: bash
        run: |
          set -euo pipefail
          curl https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Show planned Drive targets
        shell: bash
        run: |
          set -euo pipefail
          echo "docs/ -> <Drive root folder>/docs/ (rclone copy; deletions are not propagated)"
          echo "claude.md -> <Drive root folder>/claude.md (rclone copyto)"
          echo "AGENTS.md -> <Drive root folder>/AGENTS.md (rclone copyto)"

      - name: Sync docs and root markdown files with rclone
        shell: bash
        run: |
          set -euo pipefail

          credentials_file="$(mktemp)"
          config_file="$(mktemp)"
          trap 'rm -f "${credentials_file}" "${config_file}"' EXIT

          printf '%s' "${GDRIVE_CREDENTIALS}" | base64 --decode > "${credentials_file}"

          cat > "${config_file}" <<EOF
          [gdrive]
          type = drive
          scope = drive
          root_folder_id = ${GDRIVE_FOLDER_ID}
          service_account_file = ${credentials_file}
          EOF

          export RCLONE_CONFIG="${config_file}"

          # Use the configured root folder ID as the Drive root so every upload goes to a
          # fixed, predictable destination. This avoids creating stray nested docs folders.
          rclone mkdir gdrive:docs

          # Copy the contents of repo docs/ into <Drive root folder>/docs/.
          # copy is the safer default here: it updates and adds files without deleting
          # Drive-only files if the repo docs tree no longer contains them.
          rclone copy docs gdrive:docs

          # Keep these root-level files explicit and deterministic by targeting exact paths.
          rclone copyto claude.md gdrive:claude.md
          rclone copyto AGENTS.md gdrive:AGENTS.md
