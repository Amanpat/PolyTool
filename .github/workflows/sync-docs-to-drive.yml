name: Sync Docs to Google Drive
on:
  # Manual trigger exists for connector/sync verification when path filters do not fire.
  workflow_dispatch:
  push:
    branches: [main, phase-1, phase-1A]
    paths:
      - 'docs/**'
      - 'claude.md'
      - 'AGENTS.md'
      - 'config/strategy_research_program.md'

jobs:
  sync-to-drive:
    runs-on: ubuntu-latest
    env:
      GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Google Drive secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GDRIVE_CREDENTIALS}" ]; then
            echo "GDRIVE_CREDENTIALS missing or empty. Configure the repository secret before running Drive sync." >&2
            exit 1
          fi
          echo "GDRIVE_CREDENTIALS present"

          if [ -z "${GDRIVE_FOLDER_ID}" ]; then
            echo "GDRIVE_FOLDER_ID missing or empty. Configure the repository secret before running Drive sync." >&2
            exit 1
          fi
          echo "GDRIVE_FOLDER_ID present"

          credentials_file="$(mktemp)"
          trap 'rm -f "${credentials_file}"' EXIT

          if ! printf '%s' "${GDRIVE_CREDENTIALS}" | base64 --decode > "${credentials_file}" 2>/dev/null; then
            echo "GDRIVE_CREDENTIALS base64 decode failed. Store the service-account JSON as a base64-encoded repository secret." >&2
            exit 1
          fi
          echo "GDRIVE_CREDENTIALS base64 decode passed"

          python3 - "${credentials_file}" <<'PY'
          import json
          import pathlib
          import sys

          credentials_path = pathlib.Path(sys.argv[1])
          try:
              payload = json.loads(credentials_path.read_text())
          except json.JSONDecodeError:
              print(
                  "GDRIVE_CREDENTIALS JSON parse failed. Decoded secret is not valid JSON.",
                  file=sys.stderr,
              )
              sys.exit(1)

          required_keys = ("type", "client_email", "private_key", "project_id")
          missing_keys = [key for key in required_keys if not payload.get(key)]
          if missing_keys:
              print(
                  "GDRIVE_CREDENTIALS JSON validation failed. Missing required service-account keys: "
                  + ", ".join(missing_keys),
                  file=sys.stderr,
              )
              sys.exit(1)

          if payload.get("type") != "service_account":
              print(
                  "GDRIVE_CREDENTIALS JSON validation failed. type must be service_account.",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY
          echo "GDRIVE_CREDENTIALS JSON parse passed"

      - name: Upload docs folder
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: "docs/"
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: "true"
          mirrorDirectoryStructure: "true"

      - name: Upload claude.md
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: "claude.md"
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: "true"

      - name: Upload AGENTS.md
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: "AGENTS.md"
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: "true"
