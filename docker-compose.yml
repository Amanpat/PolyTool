services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: polytool-clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/initdb:/docker-entrypoint-initdb.d:ro
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-polytool}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-polytool_admin}
      - "CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?set CLICKHOUSE_PASSWORD in .env before starting ClickHouse}"
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user \"$CLICKHOUSE_USER\" --password \"$CLICKHOUSE_PASSWORD\" --query \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - polytool

  grafana:
    image: grafana/grafana:11.4.0
    container_name: polytool-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - polytool

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: polytool-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - GAMMA_API_BASE=${GAMMA_API_BASE:-https://gamma-api.polymarket.com}
      - DATA_API_BASE=${DATA_API_BASE:-https://data-api.polymarket.com}
      - INGEST_MAX_PAGES_DEFAULT=${INGEST_MAX_PAGES_DEFAULT:-50}
      - HTTP_TIMEOUT_SECONDS=${HTTP_TIMEOUT_SECONDS:-20}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-polytool_admin}
      - "CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?set CLICKHOUSE_PASSWORD in .env before starting ClickHouse}"
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DB:-polytool}
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - polytool

  migrate:
    image: clickhouse/clickhouse-server:latest
    container_name: polytool-migrate
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-polytool_admin}
      - "CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?set CLICKHOUSE_PASSWORD in .env before starting ClickHouse}"
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-polytool}
    volumes:
      - ./infra/clickhouse/initdb:/migrations:ro
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - polytool
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        echo "Waiting for ClickHouse to be ready..."
        for i in $$(seq 1 60); do
          if clickhouse-client --host clickhouse --port 9000 --user "$$CLICKHOUSE_USER" --password "$$CLICKHOUSE_PASSWORD" --query "SELECT 1" >/dev/null 2>&1; then
            echo "ClickHouse is ready."
            break
          fi
          sleep 1
        done
        echo "Applying ClickHouse migrations from /migrations..."
        for f in /migrations/*.sql; do
          echo "Running $$f..."
          clickhouse-client --host clickhouse --port 9000 --user "$$CLICKHOUSE_USER" --password "$$CLICKHOUSE_PASSWORD" --multiquery < "$$f"
        done
        echo "Migrations complete."

  polytool:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polytool-cli
    env_file:
      - .env
    profiles:
      - cli
    volumes:
      - ./artifacts:/app/artifacts
      - ./config:/app/config:ro
      - ./kb:/app/kb
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - polytool

  # APScheduler RIS scheduler -- always-on in default stack (no compose profile).
  # To use n8n instead: docker compose stop ris-scheduler && docker compose --profile ris-n8n up -d n8n
  # See docs/adr/0013-ris-n8n-pilot-scoped.md for scheduler mutual exclusion.
  ris-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polytool-ris-scheduler
    env_file:
      - .env
    command: ["python", "-m", "polytool", "research-scheduler", "start"]
    restart: unless-stopped
    volumes:
      - ./kb:/app/kb
      - ./artifacts:/app/artifacts
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - polytool

  pair-bot-paper:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: polytool-pair-bot-paper
    env_file:
      - .env
    command: [
      "python", "-m", "polytool", "crypto-pair-run",
      "--duration-hours", "24",
      "--cycle-interval-seconds", "30",
      "--reference-feed-provider", "coinbase"
    ]
    volumes:
      - ./artifacts:/app/artifacts
    profiles:
      - pair-bot
    restart: "no"

  pair-bot-live:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: polytool-pair-bot-live
    env_file:
      - .env
    command: [
      "python", "-m", "polytool", "crypto-pair-run",
      "--live",
      "--confirm", "CONFIRM",
      "--duration-hours", "8",
      "--cycle-interval-seconds", "30"
    ]
    volumes:
      - ./artifacts:/app/artifacts
    profiles:
      - pair-bot
    restart: unless-stopped

  n8n:
    build:
      context: ./infra/n8n
      dockerfile: Dockerfile
    image: polytool-n8n:latest
    container_name: polytool-n8n
    profiles:
      - ris-n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      # N8N_BASIC_AUTH_ACTIVE/USER/PASSWORD are removed in n8n 2.x (no-op; kept for reference).
      # n8n 2.x uses owner setup wizard on first run at http://localhost:5678/setup.
      - N8N_PUBLIC_API_ENABLED=true
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-changeme_32chars_min_replace_this}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-UTC}
      - TZ=${GENERIC_TIMEZONE:-UTC}
      # N8N_RUNNERS_ENABLED is replaced by N8N_RUNNERS_MODE in n8n 2.x.
      - N8N_RUNNERS_MODE=internal
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      # N8N_MCP_BEARER_TOKEN: operative in n8n 2.x for /mcp-server/http bearer auth.
      - N8N_MCP_BEARER_TOKEN=${N8N_MCP_BEARER_TOKEN:-replace_with_mcp_bearer_token}
      - POLYTOOL_HOST=http://host.docker.internal:${MCP_PORT:-8001}
      - N8N_EXEC_CONTAINER=${N8N_EXEC_CONTAINER:-polytool-ris-scheduler}
      # NODES_EXCLUDE=[] re-enables n8n-nodes-base.executeCommand (disabled by default in n8n 2.x).
      # Required for RIS workflows that use docker exec via Execute Command nodes.
      - NODES_EXCLUDE=[]
    group_add:
      - "0"
    volumes:
      - n8n_data:/home/node/.n8n
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - polytool
    restart: unless-stopped

volumes:
  clickhouse_data:
  grafana_data:
  n8n_data:

networks:
  polytool:
    driver: bridge
